name: gst_invoice_pro
description: "GST Invoice Pro - GST Calculator & Invoice Generator for Indian Small Businesses"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # PDF Generation
  pdf: ^3.11.2
  printing: ^5.13.4
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # Image Picking
  image_picker: ^1.1.2
  
  # Google Fonts
  google_fonts: ^6.2.1
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/GSTBubble Logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
